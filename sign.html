<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #00c8ffb7, #0073ffa2);
      }

      .container {
        background: #ffffff;
        padding: 40px 30px;
        border-radius: 12px;
        width: 320px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      .container h2 {
        margin-bottom: 20px;
        font-weight: 600;
        color: #333;
      }

      .form-group {
        text-align: left;
        margin-bottom: 15px;
      }

      .form-group label {
        font-size: 14px;
        color: #555;
        display: block;
        margin-bottom: 5px;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
      }

      .form-group input:focus {
        border-color: #0072ff;
        box-shadow: 0 0 5px rgba(0, 114, 255, 0.4);
      }

      .btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #0072ff;
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        color: white;
        background: #005ad1;
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(0, 114, 255, 0.4);
      }

      .footer-text {
        margin-top: 15px;
        font-size: 13px;
        color: #777;
      }

      .footer-text a {
        color: #0072ff;
        text-decoration: none;
      }

      .footer-text a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <section>
      <div class="container">
        <h2>Create Account</h2>

        <form id="submit">
          <div class="form-group">
            <label for="">Full Name</label>
            <input type="text" id="user" placeholder="Enter your name" />
          </div>

          <div class="form-group">
            <label for="">Password</label>
            <input
              type="password"
              id="pass"
              placeholder="Enter your password"
            />
          </div>

          <button type="submit" class="btn">Sign Up</button>
        </form>

        <div class="footer-text">
          Already have an account? <a href="#">Login</a>
        </div>
      </div>
    </section>

    <script>
      const submit = document.getElementById("submit");

      submit.addEventListener("submit", (e) => {
        e.preventDefault();

        let user = document.getElementById("user").value;
        let pass = document.getElementById("pass").value;

        const UserName = "Makesh";
        const PassWord = "2526";

        if (UserName === user && PassWord === pass) {
          alert("Welcome " + user + " ❤");
        } else {
          console.log(e.message);
          alert("You Are Wrong can you please correctly.....!");
        }
      });
    </script>
  </body>
</html>
